version: '3.8'

services:
  backend:
    build: 
      context: ./Backend
      dockerfile: Dockerfile
    container_name: automata_backend
    ports:
      - "5000:5000"
    environment:
      # Inyectamos la URL indicando al contenedor que apunte al Host de Windows ("127.0.0.1" del host)
      - OPENCLAW_GATEWAY_URL=http://host.docker.internal:10424
      - OPENCLAW_TOKEN=8941487567606a620353868ebbcd32f73ba9b26de1551c09
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - automata_net

  frontend:
    build: 
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: automata_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - automata_net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - automata_net

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      - ollama
    networks:
      - automata_net
    entrypoint: /bin/sh
    environment:
      - OLLAMA_HOST=ollama:11434
    command: >
      -c "
      echo 'Esperando a que Ollama inicie...';
      sleep 10;
      echo 'Descargando qwen2.5:7b...';
      ollama pull qwen2.5:7b;
      echo 'Descargando gemma:7b...';
      ollama pull gemma:7b;
      echo 'Descargando llama3.2:1b...';
      ollama pull llama3.2:1b;
      echo 'Descargando qwen2.5-coder:7b...';
      ollama pull qwen2.5-coder:7b;
      echo 'Descargando codellama:latest...';
      ollama pull codellama:latest;
      echo 'Todos los modelos descargados exitosamente.'
      "

# Usamos la red externa donde corre OpenClaw
networks:
  automata_net:
    name: automataopenclaw_automata_net
    external: true

volumes:
  ollama_data: