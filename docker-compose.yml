version: '3.8'

services:
  backend:
    build: 
      context: ./Backend
      dockerfile: Dockerfile
    container_name: automata_backend
    ports:
      - "5000:5000"
    environment:
      # Inyectamos la URL indicando al contenedor que apunte al Host de Windows ("127.0.0.1" del host)
      - OPENCLAW_GATEWAY_URL=http://host.docker.internal:10424
      - OPENCLAW_TOKEN=8941487567606a620353868ebbcd32f73ba9b26de1551c09
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - automata_net

  frontend:
    build: 
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: automata_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - automata_net

# Usamos la red externa donde corre OpenClaw
networks:
  automata_net:
    name: automataopenclaw_automata_net
    external: true
